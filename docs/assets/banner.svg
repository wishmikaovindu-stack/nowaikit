<!-- NowAIKit v2.4 banner — 400+ tools, all ServiceNow modules, 15+ AI clients -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1020;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F0C0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4C81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00F0C0;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4C81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0C0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F4C81;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#00D4AA" stroke-width="0.5">
    <line x1="0" y1="85" x2="1200" y2="85"/>
    <line x1="0" y1="170" x2="1200" y2="170"/>
    <line x1="0" y1="255" x2="1200" y2="255"/>
    <line x1="200" y1="0" x2="200" y2="340"/>
    <line x1="400" y1="0" x2="400" y2="340"/>
    <line x1="600" y1="0" x2="600" y2="340"/>
    <line x1="800" y1="0" x2="800" y2="340"/>
    <line x1="1000" y1="0" x2="1000" y2="340"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)" rx="0"/>

  <!-- Glow orbs background -->
  <ellipse cx="200" cy="170" rx="180" ry="120" fill="#00D4AA" opacity="0.04" filter="url(#softGlow)"/>
  <ellipse cx="1050" cy="170" rx="160" ry="100" fill="#0F4C81" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Left bracket decoration -->
  <text x="52" y="210" font-family="'Courier New', monospace" font-size="140" fill="#00D4AA" opacity="0.08" font-weight="bold">{</text>
  <text x="1095" y="210" font-family="'Courier New', monospace" font-size="140" fill="#0F4C81" opacity="0.08" font-weight="bold">}</text>

  <!-- Logo mark (icon + text), centered at x=600 -->
  <g transform="translate(379, 88)">
    <rect width="60" height="60" rx="13" fill="url(#iconGrad)"/>
    <svg x="13" y="13" width="34" height="34" viewBox="0 0 32 32" fill="none">
      <path d="M9 23V9l7 10V9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="23" cy="12" r="2.5" fill="#fff" opacity="0.9"/>
      <circle cx="23" cy="20" r="2.5" fill="#fff" opacity="0.9"/>
      <line x1="23" y1="14.5" x2="23" y2="17.5" stroke="#fff" stroke-width="1.5" opacity="0.6"/>
    </svg>
  </g>

  <!-- Logo text: NowAIKit -->
  <text
    x="641" y="140"
    font-family="'SF Pro Display', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="72"
    font-weight="700"
    letter-spacing="-1.5"
    text-anchor="middle"
    filter="url(#glow)"
  >
    <tspan fill="#F1F3F8">Now</tspan><tspan fill="url(#textGrad)">AI</tspan><tspan fill="#F1F3F8">Kit</tspan>
  </text>

  <!-- Accent underline spanning icon to text -->
  <rect x="379" y="158" width="462" height="2.5" fill="url(#accentGrad)" rx="2" opacity="0.6"/>

  <!-- Tagline -->
  <text
    x="600" y="208"
    font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif"
    font-size="18"
    font-weight="400"
    letter-spacing="0.3"
    text-anchor="middle"
    fill="#7E8DA8"
  >Connect Any AI to ServiceNow. Instantly.</text>

  <!-- Sub-tagline -->
  <text
    x="600" y="236"
    font-family="'SF Pro Text', 'Segoe UI', system-ui, sans-serif"
    font-size="14"
    font-weight="300"
    letter-spacing="0.2"
    text-anchor="middle"
    fill="#4A5670"
  >400+ tools · Full module coverage · Works with Claude, ChatGPT, Gemini, Cursor, Copilot &amp; more</text>

  <!-- Stats row -->
  <line x1="100" y1="268" x2="1100" y2="268" stroke="#162A3A" stroke-width="1"/>

  <!-- Stat 1: Tools -->
  <g transform="translate(170, 295)">
    <text x="0" y="0" font-family="'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="700" fill="#00D4AA" text-anchor="middle">400+</text>
    <text x="0" y="18" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#4A5670" text-anchor="middle" letter-spacing="1.5" font-weight="500">TOOLS</text>
  </g>

  <!-- Divider 1 -->
  <line x1="290" y1="278" x2="290" y2="322" stroke="#162A3A" stroke-width="1"/>

  <!-- Stat 2: Modules -->
  <g transform="translate(390, 295)">
    <text x="0" y="0" font-family="'SF Pro Display', system-ui, sans-serif" font-size="16" font-weight="700" fill="#0F4C81" text-anchor="middle">FULL</text>
    <text x="0" y="18" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#4A5670" text-anchor="middle" letter-spacing="1.5" font-weight="500">MODULE COVERAGE</text>
  </g>

  <!-- Divider 2 -->
  <line x1="510" y1="278" x2="510" y2="322" stroke="#162A3A" stroke-width="1"/>

  <!-- Stat 3: Tests -->
  <g transform="translate(600, 295)">
    <text x="0" y="0" font-family="'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="700" fill="#10B981" text-anchor="middle">61</text>
    <text x="0" y="18" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#4A5670" text-anchor="middle" letter-spacing="1.5" font-weight="500">TESTS PASSING</text>
  </g>

  <!-- Divider 3 -->
  <line x1="710" y1="278" x2="710" y2="322" stroke="#162A3A" stroke-width="1"/>

  <!-- Stat 4: Examples -->
  <g transform="translate(810, 295)">
    <text x="0" y="0" font-family="'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="700" fill="#FF6B35" text-anchor="middle">120+</text>
    <text x="0" y="18" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#4A5670" text-anchor="middle" letter-spacing="1.5" font-weight="500">EXAMPLES</text>
  </g>

  <!-- Divider 4 -->
  <line x1="930" y1="278" x2="930" y2="322" stroke="#162A3A" stroke-width="1"/>

  <!-- Stat 5: AI Clients -->
  <g transform="translate(1030, 295)">
    <text x="0" y="0" font-family="'SF Pro Display', system-ui, sans-serif" font-size="22" font-weight="700" fill="#E8466A" text-anchor="middle">15+</text>
    <text x="0" y="18" font-family="'SF Pro Text', system-ui, sans-serif" font-size="11" fill="#4A5670" text-anchor="middle" letter-spacing="1.5" font-weight="500">AI CLIENTS</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="337" width="1200" height="3" fill="url(#accentGrad)" rx="0" opacity="0.5"/>
</svg>
